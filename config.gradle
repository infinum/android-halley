ext {
    def major = 1
    def minor = 0
    def patch = 0

    buildConfig = [
            "minSdk"    : 21,
            "compileSdk": 36,
            "targetSdk" : 36,
            "buildTools": "36.0.0"
    ]
    releaseConfig = [
            "group"      : "com.infinum.halley",
            "version"    : "$major.$minor.$patch",
            "versionCode": major * 100 * 100 + minor * 100 + patch
    ]
}
